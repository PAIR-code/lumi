name: Upstream Sync

permissions:
  contents: write
  issues: write
  actions: write

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean issue notice
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '🚨 Sync Fail'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream changes
        run: |
          git remote add upstream https://github.com/PAIR-code/lumi.git
          git fetch upstream main
          git checkout -B main origin/main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork already contains upstream/main; no sync needed."
            exit 0
          fi

          git merge --no-edit upstream/main
          git push origin HEAD:main

      - name: Sync check
        if: failure()
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-issue'
          title: '🚨 Sync Fail'
          labels: '🚨 Sync Fail'
          body: |
            The scheduled upstream sync failed while merging `PAIR-code/lumi:main` into this fork's `main` branch.

            Check the workflow logs for the exact git error. If the failure is a merge conflict, resolve it locally, push the merge commit to `main`, and rerun this workflow.
